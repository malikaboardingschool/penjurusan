            { id: "Guru / Dosen Ilmu Sosial / IPS", label: "Guru / Dosen IPS", category: "IPS" },
            { id: "Ulama", label: "Ulama", category: "Lainnya" },
            { id: "Atlet", label: "Atlet", category: "Lainnya" },
            { id: "Content Creator", label: "Content Creator", category: "Lainnya" }
        ];

        // --- SKALA LIKERT REVISI (1-4: Kurang Sesuai) ---
        const SKALA_LIKERT = [
            { value: 1, label: "Tidak Sesuai", color: "border-red-200 hover:border-red-400 text-red-700 bg-red-50/30" },
            { value: 2, label: "Kurang Sesuai", color: "border-amber-200 hover:border-amber-400 text-amber-700 bg-amber-50/30" },
            { value: 3, label: "Sesuai", color: "border-blue-200 hover:border-blue-400 text-blue-700 bg-blue-50/30" },
            { value: 4, label: "Sangat Sesuai", color: "border-emerald-200 hover:border-emerald-400 text-emerald-700 bg-emerald-50/30" }
        ];

        // --- FIREBASE CONFIGURATION (FOR GITHUB PAGES PLUG-AND-PLAY) ---
        const fallbackConfig = {
            apiKey: "MASUKKAN_API_KEY_FIREBASE_ANDA",
            authDomain: "sma-malika-placement.firebaseapp.com",
            projectId: "sma-malika-placement",
            storageBucket: "sma-malika-placement.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;

        // Mendeteksi apakah user sedang menggunakan konfigurasi placeholder default
        const isPlaceholderConfig = !firebaseConfig.apiKey || 
                                    firebaseConfig.apiKey === "" || 
                                    firebaseConfig.apiKey.includes("MASUKKAN") || 
                                    firebaseConfig.apiKey === "MASUKKAN_API_KEY_FIREBASE_ANDA";

        // Inisialisasi Firebase secara kondisional untuk menjamin stabilitas plug-and-play offline & online
        let app, auth, db;
        let isFirebaseAvailable = false;

        if (!isPlaceholderConfig) {
            try {
                app = firebase.apps.length === 0 ? firebase.initializeApp(firebaseConfig) : firebase.app();
                auth = firebase.auth(app);
                db = firebase.firestore(app);
                isFirebaseAvailable = true;
            } catch (err) {
                console.warn("Koneksi Firebase gagal diinisialisasi. Berpindah ke Mode Penyimpanan Lokal:", err);
            }
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sma-malika-placement';

        // --- HELPER UNTUK PENGACAKAN ARRAY (FISHER-YATES SHUFFLE) ---
        const shuffleArray = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        // --- MAIN APPLICATION ---
        function App() {
            // Screen state: 'login' | 'assessment' | 'result' | 'admin'
            const [screen, setScreen] = useState('login');
            
            // Student State
            const [selectedClass, setSelectedClass] = useState('XI IPA/IPS - Putra');
            const [selectedName, setSelectedName] = useState('');
            const [user, setUser] = useState(null);

            // Assessment Step State
            const [step, setStep] = useState(0);

            // Ujian State (Answers & Randomized Questions)
            const [ujianAnswers, setUjianAnswers] = useState({});
            const [ujianPage, setUjianPage] = useState(0);
            const [randomizedQuestions, setRandomizedQuestions] = useState([]);

            // Angket State (Answers 1-4 for IPA, IPS)
            const [angketIpaAnswers, setAngketIpaAnswers] = useState({});
            const [angketIpsAnswers, setAngketIpsAnswers] = useState({});
            const [gayaBelajarAnswers, setGayaBelajarAnswers] = useState({});

            // Careers State
            const [selectedCareers, setSelectedCareers] = useState([]);
            const [otherCareer, setOtherCareer] = useState('');

            // Submitted Result / History from db
            const [allResults, setAllResults] = useState([]);
            const [activeResult, setActiveResult] = useState(null);
            
            // Mode Penyimpanan Aktif State (Cloud vs Lokal)
            const [isCloudActive, setIsCloudActive] = useState(false);

            // Admin Panel State
            const [adminPassword, setAdminPassword] = useState('');
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [adminError, setAdminError] = useState('');

            // Custom Modal State
            const [modalConfig, setModalConfig] = useState(null);

            // Helper untuk modal notifikasi kustom
            const showAlert = (title, message, onConfirm = () => setModalConfig(null)) => {
                setModalConfig({
                    title,
                    message,
                    showCancel: false,
                    confirmText: "Mengerti",
                    onConfirm
                });
            };

            const showConfirm = (title, message, onConfirm, onCancel = () => setModalConfig(null)) => {
                setModalConfig({
                    title,
                    message,
                    showCancel: true,
                    confirmText: "Ya, Lanjutkan",
                    cancelText: "Batal",
                    onConfirm,
                    onCancel
                });
            };

            // Setup Penyimpanan Hybrid (Real-time Cloud & Offline LocalStorage Fallback)
            useEffect(() => {
                let isMounted = true;
                let unsubscribeSnapshot = null;

                const loadLocalData = () => {
                    if (!isMounted) return;
                    try {
                        const localSubmissions = JSON.parse(localStorage.getItem('sma_malika_submissions')) || [];
                        setAllResults(localSubmissions);
                        setIsCloudActive(false);
                    } catch (e) {
                        console.error("Gagal memuat database lokal localStorage:", e);
                    }
                };

                const initAuthAndSync = async () => {
                    if (isFirebaseAvailable) {
                        try {
                            let current = auth.currentUser;
                            if (!current) {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    const cred = await auth.signInWithCustomToken(__initial_auth_token);
                                    current = cred.user;
                                } else {
                                    const cred = await auth.signInAnonymously();
                                    current = cred.user;
                                }
                            }
                            if (isMounted) {
                                setUser(current);
                                setIsCloudActive(true);
                            }

                            // Bind database real-time cloud dari Firestore
                            const pathCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('submissions');
                            unsubscribeSnapshot = pathCol.onSnapshot((snapshot) => {
                                const cloudData = [];
                                snapshot.forEach((doc) => {
                                    cloudData.push({ id: doc.id, ...doc.data() });
                                });
                                if (isMounted) {
                                    setAllResults(cloudData);
                                    setIsCloudActive(true);
                                }
                            }, (error) => {
                                console.warn("Firestore error (kemungkinan aturan akses), beralih ke local storage:", error);
                                loadLocalData();
                            });

                        } catch (err) {
                            console.warn("Autentikasi Firebase gagal, beralih ke local storage:", err);
                            loadLocalData();
                        }
                    } else {
                        // Kredensial Firebase masih kosong (Placeholder), beralih ke mode offline lokal secara otomatis
                        loadLocalData();
                    }
                };

                initAuthAndSync();

                // Dapatkan pembaruan instan tab jika berjalan di penyimpanan offline lokal
                const handleLocalStorageChange = (e) => {
                    if (e.key === 'sma_malika_submissions' && !isCloudActive) {
                        loadLocalData();
                    }
                };
                window.addEventListener('storage', handleLocalStorageChange);

                return () => {
                    isMounted = false;
                    if (unsubscribeSnapshot) unsubscribeSnapshot();
                    window.removeEventListener('storage', handleLocalStorageChange);
                };
            }, [user]);

            // Filtered students according to search
            const studentsList = DATABASE_SISWA[selectedClass] || [];

            // Main scoring logic (Disinkronkan dengan rentang skor skala 1-4)
            const calculateResults = (finalAnswersUjian, finalAngketIpa, finalAngketIps, finalGayaBelajar, finalCareers) => {
                let scoreIpaUjian = 0;
                let scoreIpsUjian = 0;

                SOAL_UJIAN.forEach((soal) => {
                    const givenAns = finalAnswersUjian[soal.id];
                    if (givenAns === soal.answer) {
                        if (soal.type === "IPA") scoreIpaUjian += 1;
                        else scoreIpsUjian += 1;
                    }
                });

                const sumIpaAngket = Object.values(finalAngketIpa).reduce((a, b) => a + Number(b), 0);
                const sumIpsAngket = Object.values(finalAngketIps).reduce((a, b) => a + Number(b), 0);
                const pctIpaAngket = (sumIpaAngket / 60) * 100;
                const pctIpsAngket = (sumIpsAngket / 60) * 100;

                let sumIpaGaya = 0;
                let sumIpsGaya = 0;
                ANGKET_GAYA_BELAJAR.forEach((g) => {
                    const score = Number(finalGayaBelajar[g.id]) || 2;
                    if (g.category === "IPA") sumIpaGaya += score;
                    else sumIpsGaya += score;
                });
                const pctIpaGaya = (sumIpaGaya / 20) * 100;
                const pctIpsGaya = (sumIpsGaya / 20) * 100;

                let careerIpaCount = 0;
                let careerIpsCount = 0;
                finalCareers.forEach((cId) => {
                    const prof = PROFESI_LIST.find(p => p.id === cId);
                    if (prof) {
                        if (prof.category === "IPA") careerIpaCount += 1;
                        if (prof.category === "IPS") careerIpsCount += 1;
                    }
                });

                const weightUjianIpa = (scoreIpaUjian / 20) * 35;
                const weightUjianIps = (scoreIpsUjian / 20) * 35;

                const weightAngketIpa = (sumIpaAngket / 60) * 40;
                const weightAngketIps = (sumIpsAngket / 60) * 40;

                const weightGayaIpa = (sumIpaGaya / 20) * 15;
                const weightGayaIps = (sumIpsGaya / 20) * 15;

                const weightCareerIpa = (careerIpaCount / 3) * 10;
                const weightCareerIps = (careerIpsCount / 3) * 10;

                const totalIpa = weightUjianIpa + weightAngketIpa + weightGayaIpa + weightCareerIpa;
                const totalIps = weightUjianIps + weightAngketIps + weightGayaIps + weightCareerIps;

                let recommendation = "Fleksibel / Seimbang";
                let reason = "";

                if (totalIpa > totalIps + 4) {
                    recommendation = "MIPA (Matematika dan Ilmu Pengetahuan Alam)";
                    reason = `Analisis sistem mendeteksi minat eksakta, kemampuan analisis numerik Anda yang kuat di ujian sains (${scoreIpaUjian}/20), serta kecenderungan gaya belajar sistematis/prosedural yang dominan mendukung Anda untuk sukses di rumpun MIPA.`;
                } else if (totalIps > totalIpa + 4) {
                    recommendation = "IPS (Ilmu Pengetahuan Sosial)";
                    reason = `Kecerdasan inter personal, kecintaan Anda terhadap analisis fenomena sosial, minat wirausaha yang tinggi, serta pemahaman materi humaniora yang sangat baik di ujian sosial (${scoreIpsUjian}/20) menunjukkan potensi optimal Anda berada di rumpun IPS.`;
                } else {
                    recommendation = "MIPA atau IPS (Seimbang)";
                    reason = `Hasil asesmen Anda menunjukkan keseimbangan potensi yang luar biasa antara penalaran sains/eksakta (${totalIpa.toFixed(1)}%) and dinamika ilmu sosial/humaniora (${totalIps.toFixed(1)}%). Anda memiliki fleksibilitas untuk sukses di kedua jurusan tersebut berdasarkan kenyamanan karir pilihan Anda.`;
                }

                return {
                    scoreIpaUjian,
                    scoreIpsUjian,
                    pctIpaAngket,
                    pctIpsAngket,
                    pctIpaGaya,
                    pctIpsGaya,
                    careerIpaCount,
                    careerIpsCount,
                    totalIpa,
                    totalIps,
                    recommendation,
                    reason,
                    timestamp: new Date().toISOString()
                };
            };

            // Start Assessment Action (Ditambahkan Pengacakan Soal Pintar)
            const handleStart = () => {
                if (!selectedName) {
                    showAlert("Nama Belum Terpilih", "Silakan pilih Nama Siswa terlebih dahulu sebelum memulai sesi.");
                    return;
                }
                
                // 1. Ekstrak soal IPA dan IPS secara terpisah
                const ipaQuestions = SOAL_UJIAN.filter(q => q.type === "IPA");
                const ipsQuestions = SOAL_UJIAN.filter(q => q.type === "IPS");

                // 2. Acak masing-masing grup secara independen agar urutan tidak monoton
                const randomizedIpa = shuffleArray(ipaQuestions);
                const randomizedIps = shuffleArray(ipsQuestions);

                // 3. Gabungkan kembali (IPA tetap di awal, IPS tetap di akhir)
                const combinedShuffledQuestions = [...randomizedIpa, ...randomizedIps];
                setRandomizedQuestions(combinedShuffledQuestions);

                // Prepopulate default survey scores with 2 (Kurang Sesuai)
                const initAngketIpa = {};
                ANGKET_IPA.forEach((_, idx) => initAngketIpa[idx + 1] = 2);
                const initAngketIps = {};
                ANGKET_IPS.forEach((_, idx) => initAngketIps[idx + 1] = 2);
                const initGaya = {};
                ANGKET_GAYA_BELAJAR.forEach((g) => initGaya[g.id] = 2);

                setAngketIpaAnswers(initAngketIpa);
                setAngketIpsAnswers(initAngketIps);
                setGayaBelajarAnswers(initGaya);
                
                setUjianAnswers({});
                setSelectedCareers([]);
                setOtherCareer('');
                setStep(0);
                setUjianPage(0);
                setScreen('assessment');
            };

            // Alur Tombol Navigasi Ujian: Cari apakah ada soal yang terlewat
            const handleNextFromUjian = () => {
                const unanswered = SOAL_UJIAN.filter(soal => !ujianAnswers[soal.id]);
                
                if (unanswered.length > 0) {
                    const firstUnanswered = unanswered[0];
                    // Temukan di halaman berapa soal yang terlewat tersebut berada di dalam susunan randomizedQuestions saat ini
                    const shuffledIndex = randomizedQuestions.findIndex(q => q.id === firstUnanswered.id);
                    const targetPage = shuffledIndex !== -1 ? Math.floor(shuffledIndex / 5) : 0;
                    setUjianPage(targetPage);
                    
                    showAlert(
                        "Soal Ujian Belum Lengkap", 
                        `Terdapat ${unanswered.length} soal akademik yang terlewat belum terjawab. Kami telah mengembalikan Anda ke halaman Soal Nomor ${shuffledIndex + 1} (No. Asli: ${firstUnanswered.id}) untuk dilengkapi terlebih dahulu.`
                    );
                } else {
                    setStep(2);
                }
            };

            // Simpan data kustom ke penyimpanan lokal
            const saveToLocalStorage = (payload) => {
                try {
                    const currentData = JSON.parse(localStorage.getItem('sma_malika_submissions')) || [];
                    const newData = [...currentData, { id: 'local_' + Date.now(), ...payload }];
                    localStorage.setItem('sma_malika_submissions', JSON.stringify(newData));
                    setAllResults(newData);
                } catch (e) {
                    console.error("Gagal menginput data siswa secara lokal:", e);
                }

            // Submit Answers to cloud
            const handleSubmit = async () => {
                if (selectedCareers.length < 1) {
                    showAlert("Pilihan Karir Kosong", "Silakan pilih minimal 1 jenis profesi karir impian Anda.");
                    return;
                }

                const resultsObj = calculateResults(
                    ujianAnswers,
                    angketIpaAnswers,
                    angketIpsAnswers,
                    gayaBelajarAnswers,
                    selectedCareers

                setActiveResult(finalPayload);

                        await pathCol.add(finalPayload);

            // PDF Download Engine (Client-side HTML-to-PDF Generator - REVISI KOTA TANGERANG, TIM PENGEMBANG MBS, ALL TEAM)

                                    <td style="padding: 8px; border: 1px solid #e2e8f0; text-align: center; font-weight: bold; color: #ec4899;">${dataToPrint.results?.pctIpsAngket?.toFixed(1)}%</td>

            // --- EKSPOR REKAPITULASI SELURUH SISWA KE FORMAT PDF RESMI (REVISI KOTA TANGERANG, TIM PENGEMBANG MBS, ALL TEAM) ---
            const handleExportAllPDF = () => {

                    showAlert("Data Kosong", "Belum ada respon siswa yang masuk untuk dicetak.");
                    return;

                const element = document.createElement("div");
                element.className = "p-8 bg-white text-slate-800 space-y-6";
                element.style.fontFamily = "'Plus Jakarta Sans', sans-serif";

                                        <div className="w-full h-64 flex justify-center items-center relative">
                                            <div className="w-full flex gap-4 h-full items-end justify-center px-4">
                                                <div className="flex flex-col items-center flex-grow max-w-[100px]">
                                                    <span className="text-xs font-bold text-blue-600 mb-1">{activeResult.results.totalIpa.toFixed(1)}%</span>
                                                    <div 
                                                        className="w-full bg-blue-500 rounded-t-xl transition-all duration-1000 shadow-lg shadow-blue-500/10 animate-scaleUp" 
                                                        style={{ height: `${activeResult.results.totalIpa * 1.8}px` }}
                                                    ></div>
                                                    <span className="text-xs font-bold text-slate-700 mt-2">MIPA / IPA</span>
                                                </div>
                                                <div className="flex flex-col items-center flex-grow max-w-[100px]">
                                                    <span className="text-xs font-bold text-pink-600 mb-1">{activeResult.results.totalIps.toFixed(1)}%</span>
                                                    <div 
                                                        className="w-full bg-pink-500 rounded-t-xl transition-all duration-1000 shadow-lg shadow-pink-500/10 animate-scaleUp" 
                                                        style={{ height: `${activeResult.results.totalIps * 1.8}px` }}
                                                    ></div>
                                                    <span className="text-xs font-bold text-slate-700 mt-2">HUMANIORA / IPS</span>
                                                </div>
                                            </div>
                                        </div>
                                        <p className="text-[11px] text-slate-400 mt-6 text-center leading-relaxed">Persentase di atas dihitung secara berimbang berdasarkan keterpaduan antara kompetensi ujian, angket minat, gaya belajar, dan kecocokan profil karir.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {screen === 'admin' && (
                            <div className="bg-white rounded-3xl p-6 sm:p-8 shadow-xl border border-slate-100 space-y-6">
                                {!isAdminAuthenticated ? (
                                    /* Passcode Gate */
                                    <div className="max-w-md mx-auto py-12 text-center space-y-4">
                                        <div className="text-5xl text-blue-600"><i className="fa-solid fa-lock"></i></div>
                                        <h3 className="text-xl font-bold text-slate-900">Keamanan Portal Guru</h3>
                                        <p className="text-xs text-slate-500">Masukkan kata sandi guru / admin untuk melihat seluruh data spreadsheet hasil penjurusan siswa.</p>
                                        
                                        <div className="pt-2 space-y-2">
                                            <input 
                                                type="password" 
                                                placeholder="Sandi Admin (Gunakan: adminmalika)"
                                                value={adminPassword}
                                                onChange={(e) => { setAdminPassword(e.target.value); setAdminError(''); }}
                                                className="w-full bg-slate-50 border border-slate-200 text-slate-800 py-3 px-4 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm text-center font-bold"
                                            />
                                            {adminError && <p className="text-xs text-red-500 font-semibold">{adminError}</p>}
                                            <button 
                                                onClick={() => {
                                                    if (adminPassword === 'admincakep') {
                                                        setIsAdminAuthenticated(true);
                                                    } else {
                                                        setAdminError('Kata sandi salah. Silakan coba lagi.');
                                                    }
                                                }}
                                                className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm rounded-xl transition-all shadow"
                                            >
                                                Masuk Portal
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    /* Dashboard Panel */
                                    <div className="space-y-6 animate-fadeIn">
                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-100 pb-4">
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-900">Dashboard Hasil Penjurusan Siswa (Live Feed)</h3>
                                                <p className="text-xs text-slate-500">Menampilkan seluruh data masuk dari Firestore SMA Malika IBS secara langsung.</p>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                <button 
                                                    onClick={handleGenerateMockData}
                                                    className="bg-purple-50 hover:bg-purple-100 text-purple-700 font-semibold text-xs py-2.5 px-4 rounded-xl transition-all flex items-center gap-2 border border-purple-200"
                                                >
                                                    <i className="fa-solid fa-wand-magic-sparkles"></i>
                                                    Generate 10 Data Simulasi
                                                </button>
                                                
                                                {/* EKSPOR KE PDF */}
                                                <button 
                                                    onClick={handleExportAllPDF}
                                                    className="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xs py-2.5 px-4 rounded-xl transition-all flex items-center gap-2 shadow-sm"
                                                >
                                                    <i className="fa-solid fa-file-pdf"></i>
                                                    Ekspor Rekapitulasi (PDF)
                                                </button>

                                                {/* TOMBOL: HAPUS SEMUA DATA */}
                                                <button 
                                                    onClick={handleClearAllData}
                                                    className="bg-red-600 hover:bg-red-700 text-white font-semibold text-xs py-2.5 px-4 rounded-xl transition-all flex items-center gap-2 shadow-sm"
                                                >
                                                    <i className="fa-solid fa-trash-can"></i>
                                                    Hapus Semua Data
                                                </button>
                                            </div>
                                        </div>

                                        {/* Statistics Row */}
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            <div className="p-4 bg-slate-50 border border-slate-200/50 rounded-2xl">
                                                <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Total Respon Siswa</span>
                                                <p className="text-2xl font-black text-slate-800 mt-1">{allResults.length}</p>
                                            </div>
                                            <div className="p-4 bg-blue-50 border border-blue-100 rounded-2xl">
                                                <span className="text-[10px] text-blue-700 font-bold uppercase tracking-wider">Rekomendasi MIPA</span>
                                                <p className="text-2xl font-black text-blue-800 mt-1">
                                                    {allResults.filter(r => r.results?.recommendation?.includes('MIPA') && !r.results?.recommendation?.includes('Seimbang')).length}
                                                </p>
                                            </div>
                                            <div className="p-4 bg-pink-50 border border-pink-100 rounded-2xl">
                                                <span className="text-[10px] text-pink-700 font-bold uppercase tracking-wider">Rekomendasi IPS</span>
                                                <p className="text-2xl font-black text-pink-800 mt-1">
                                                    {allResults.filter(r => r.results?.recommendation?.includes('IPS') && !r.results?.recommendation?.includes('Seimbang')).length}
                                                </p>
                                            </div>
                                            <div className="p-4 bg-cyan-50 border border-cyan-100 rounded-2xl">
                                                <span className="text-[10px] text-cyan-700 font-bold uppercase tracking-wider">Fleksibel / Seimbang</span>
                                                <p className="text-2xl font-black text-cyan-800 mt-1">
                                                    {allResults.filter(r => r.results?.recommendation?.includes('Seimbang')).length}
                                                </p>
                                            </div>
                                        </div>

                                        {/* Real-time Submissions Spreadsheet/Table */}
                                        <div className="border border-slate-200 rounded-2xl overflow-hidden bg-white shadow-sm">
                                            <div className="overflow-x-auto">
                                                <table className="min-w-full divide-y divide-slate-200">
                                                    <thead className="bg-slate-50">
                                                        <tr>
                                                            <th scope="col" className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase">No</th>
                                                            <th scope="col" className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase">Nama Siswa</th>
                                                            <th scope="col" className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase">Kelompok Kelas</th>
                                                            <th scope="col" className="px-4 py-3 text-center text-xs font-bold text-blue-600 uppercase">Ujian IPA</th>
                                                            <th scope="col" className="px-4 py-3 text-center text-xs font-bold text-pink-600 uppercase">Ujian IPS</th>
                                                            <th scope="col" className="px-4 py-3 text-center text-xs font-bold text-blue-600 uppercase">Minat IPA</th>
                                                            <th scope="col" className="px-4 py-3 text-center text-xs font-bold text-pink-600 uppercase">Minat IPS</th>
                                                            <th scope="col" className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase font-semibold text-blue-700">Rekomendasi</th>
                                                            <th scope="col" className="px-4 py-3 text-center text-xs font-bold text-slate-500 uppercase">Aksi</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-200 text-xs">
                                                        {allResults.length === 0 ? (
                                                            <tr>
                                                                <td colSpan="9" className="text-center py-8 text-slate-400 font-medium">Belum ada respon ujian atau angket yang masuk.</td>
                                                            </tr>
                                                        ) : (
                                                            allResults.map((row, index) => (
                                                                <tr key={index} className="hover:bg-slate-50">
                                                                    <td className="px-4 py-3 text-slate-500 font-medium">{index + 1}</td>
                                                                    <td className="px-4 py-3 font-bold text-slate-800">{row.nama}</td>
                                                                    <td className="px-4 py-3 text-slate-500 font-medium">{row.kelas}</td>
                                                                    <td className="px-4 py-3 text-center font-bold text-blue-600">{row.results?.scoreIpaUjian} <span className="text-[10px] text-slate-400">/20</span></td>
                                                                    <td className="px-4 py-3 text-center font-bold text-pink-600">{row.results?.scoreIpsUjian} <span className="text-[10px] text-slate-400">/20</span></td>
                                                                    <td className="px-4 py-3 text-center font-medium text-blue-500">{row.results?.pctIpaAngket?.toFixed(0)}%</td>
                                                                    <td className="px-4 py-3 text-center font-medium text-pink-500">{row.results?.pctIpsAngket?.toFixed(0)}%</td>
                                                                    <td className="px-4 py-3">
                                                                        <span className={`inline-block px-2.5 py-1 rounded-full font-bold text-[10px] uppercase ${row.results?.recommendation?.includes('MIPA') ? 'bg-blue-100 text-blue-800' : row.results?.recommendation?.includes('IPS') ? 'bg-pink-100 text-pink-800' : 'bg-cyan-100 text-cyan-800'}`}>
                                                                            {row.results?.recommendation?.split(' ')[0]}
                                                                        </span>
                                                                    </td>
                                                                    <td className="px-4 py-3 text-center">
                                                                        <button 
                                                                            onClick={() => handleDownloadPDF(row)}
                                                                            className="bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold py-1 px-2.5 rounded-lg border border-blue-200/60 transition-all flex items-center gap-1 mx-auto"
                                                                            title="Unduh Berkas PDF Resmi Siswa"
                                                                        >
                                                                            <i className="fa-solid fa-file-pdf"></i>
                                                                            <span>PDF</span>
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            ))
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* PLATFORM FOOTER */}
                    <footer className="bg-slate-900 text-slate-400 text-xs py-6 mt-12 border-t border-slate-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left">
                            <div>
                                <p className="font-bold text-slate-300">SMA Malika Islamic Boarding School</p>
                                <p className="text-[11px] mt-0.5 text-slate-500">Mencetak Generasi Unggul Berlandaskan Nilai Islam & Sains Modern</p>
                            </div>
                            <div className="text-[11px] text-slate-500">
                                Sistem Penjurusan & Angket Minat Digital © 2026. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
